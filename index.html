<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笑顔判定アプリ（画像アップロード版）</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 2.2rem; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 1rem; }

        /* メインコンテナ */
        #app-card {
            background: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* 画像アップロードとプレビューエリア */
        #media-area {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: #f0f3f8;
            border-radius: 15px;
            border: 2px dashed #d1d9e6;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            display: none; /* 初期は非表示 */
            object-fit: contain;
        }
        #upload-placeholder {
            color: #8fa1c0;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* アップロードボタン */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 25px;
        }
        #upload-btn {
            background-color: #4a90e2;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }
        #upload-btn:hover { background-color: #357abd; }
        #image-input {
            position: absolute;
            left: 0; top: 0;
            opacity: 0;
            font-size: 100px;
            cursor: pointer;
        }

        /* 判定結果エリア */
        #result-box {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 10px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        #smile-score-wrapper {
            margin-top: 15px;
            width: 100%;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
            display: none; /* 初期は非表示 */
        }
        #smile-progress {
            width: 100%;
            height: 15px;
            background-color: #e6ebf1;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #dce2e9;
        }
        #smile-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff9f43, #ee5253);
            width: 0%;
            transition: width 0.3s;
        }

        /* 笑顔の時の色 */
        .result-smile { color: #ee5253; }
        .result-serious { color: #57606f; }

        /* ローディングとエラーメッセージ */
        #status-msg {
            font-size: 1rem;
            color: #e67e22;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <h1>😁 笑顔判定アプリ 😁</h1>
    <div class="subtitle">画像をアップロードして、笑顔度をチェック！</div>

    <div id="app-card">
        <div id="status-msg">
            <span id="spinner">⏳</span>
            <span id="status-text">AIモデルを読み込み中...</span>
        }</div>

        <div id="media-area">
            <img id="preview-image" src="#" alt="プレビュー">
            <div id="upload-placeholder">
                <span style="font-size: 3rem;">📸</span>
                <span>画像をアップロード</span>
                <span style="font-size: 0.8rem;">（またはドラッグ＆ドロップ）</span>
            </div>
        </div>

        <div class="upload-btn-wrapper">
            <button id="upload-btn">📁 ファイルを選択</button>
            <input type="file" id="image-input" accept="image/*" disabled>
        </div>

        <div id="result-box">判定中...</div>

        <div id="smile-score-wrapper">
            <div id="smile-progress"><div id="smile-bar"></div></div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const previewImage = document.getElementById('preview-image');
        const uploadPlaceholder = document.getElementById('upload-placeholder');
        const resultBox = document.getElementById('result-box');
        const smileScoreWrapper = document.getElementById('smile-score-wrapper');
        const smileBar = document.getElementById('smile-bar');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('spinner');

        // 1. AIモデルの読み込み
        async function init() {
            // あなたのリポジトリ内のファイルを読み込む相対パス
            const MODEL_URL = './';
            
            try {
                // モデルを順次読み込み
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNavigator.loadFromUri(MODEL_URL);
                
                statusText.innerText = '準備完了！';
                spinner.innerText = '✅';
                resultBox.innerText = '画像をアップロードしてください';
                imageInput.disabled = false; // アップロードを有効化

                initUploadListener();
            } catch (err) {
                console.error("モデルの読み込みに失敗しました:", err);
                statusText.innerText = 'エラー: モデル読み込み失敗 (ファイル不足かURLミス)';
                spinner.innerText = '❌';
                resultBox.innerText = '--';
            }
        }

        // 画像アップロードのリスナーを設定
        function initUploadListener() {
            // ファイル選択時
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                handleFile(file);
            });

            // ドラッグ＆ドロップ対応
            const mediaArea = document.getElementById('media-area');
            mediaArea.addEventListener('dragover', (e) => { e.preventDefault(); mediaArea.style.borderColor = '#4a90e2'; });
            mediaArea.addEventListener('dragleave', () => { mediaArea.style.borderColor = '#d1d9e6'; });
            mediaArea.addEventListener('drop', (e) => {
                e.preventDefault();
                mediaArea.style.borderColor = '#d1d9e6';
                const file = e.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/')) return;
                handleFile(file);
            });
        }

        // ファイルを処理してプレビューを表示
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                // プレビュー表示
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
                uploadPlaceholder.style.display = 'none';
                
                // 画像が読み込まれたら判定を開始
                resultBox.innerText = '⌛ AIが判定中...';
                resultBox.className = '';
                smileScoreWrapper.style.display = 'none';
                
                detectFace();
            };
            reader.readAsDataURL(file);
        }

        // 2. 笑顔の判定（アップロードされた画像に対して）
        async function detectFace() {
            // face-api.jsの処理完了を少し待つための小さなディレイ（任意）
            await new Promise(r => setTimeout(r, 300));

            // 軽量なTinyFaceDetectorを使用し、表情(Expressions)を検出
            const detections = await faceapi.detectSingleFace(previewImage, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();

            if (detections) {
                // happy（笑顔）の確率を取得 (0.0 ～ 1.0)
                const smileProbability = detections.expressions.happy;
                const smileScore = Math.round(smileProbability * 100);

                // UIの更新
                smileScoreWrapper.style.display = 'block';
                smileBar.style.width = `${smileScore}%`;

                // 笑顔度が 60% 以上なら「笑顔」と判定
                if (smileScore > 60) {
                    resultBox.innerHTML = `🥰 笑顔！ <span class="result-smile">(${smileScore}%)</span>`;
                    resultBox.className = 'result-smile';
                } else {
                    resultBox.innerHTML = `😐 真顔 <span class="result-serious">(${smileScore}%)</span>`;
                    resultBox.className = 'result-serious';
                }
            } else {
                // 顔が見つからない
                resultBox.innerText = '👤 顔が見つかりませんでした';
                resultBox.className = '';
                smileScoreWrapper.style.display = 'none';
            }
        }

        // アプリ起動
        init();
    </script>
</body>
</html>
